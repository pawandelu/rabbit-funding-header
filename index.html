<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Rabbit Funding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    .custom-nav-container {
        max-width: 1172px;
        width: 100%;
        margin: auto;
        padding: 0 16px;
    }

    .container {
        max-width: 1172px;
        margin: auto;
        width: 100%;
    }

    .btn {
        color: rgba(43, 43, 43, 1);
    }

    .menu a {
        color: rgba(78, 78, 78, 1);
        font-weight: 400;
        font-size: 16px;
        white-space: nowrap;
    }

    .menu-icon {
        display: none;
    }

    @media (max-width:767.98px) {
        .menu {
            position: fixed;
            background-color: whitesmoke;
            width: 100%;
            height: 100%;
            top: 0;
            left: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 300ms;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            width: 23px;
            z-index: 0;

        }

        .menu-icon span {
            width: 100%;
            height: 3px;
            background: #333;
            border-radius: 5px;
            transform-origin: left;
        }

        #menu-button:checked~.menu {
            left: 0;
        }

        .container {
            flex-direction: column;
        }
    }
</style>

<body>

    <header>
        <div class="custom-nav-container">
            <!-- navber -->
            <div class="d-flex align-items-center justify-content-between py-4 gap-2">
                <a href="/">
                    <img src="/assets/images/svg/logo.svg" alt="">
                </a>
                <input hidden type="checkbox" id="menu-button">
                <label class="d-md-none position-relative z-1" for="menu-button">
                    <div class="menu-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </label>
                <!-- navmenu -->
                <nav class="menu">
                    <div class="d-flex gap-4  align-items-center flex-column flex-md-row">
                        <a class="text-decoration-none" href="/">Home</a>
                        <a class="text-decoration-none" href="/">Programs</a>
                        <a class="text-decoration-none" href="/">How It Works</a>
                        <a class="text-decoration-none" href="/">Testimonials</a>
                        <a class="text-decoration-none" href="/">About</a>
                    </div>
                </nav>
                <button
                    class="btn px-4 py-9 rounded-5 border-black border-2 d-md-flex d-none m-0 text-nowrap">Contact</button>
            </div>
        </div>
        <section>
            <div class="container d-flex gap-5">
                <div class="col-6 ">
                    <h1>We Built Rabbit for Founders Who Got Told “No.</h1>
                    <h5>Traditional lenders fund files. We fund people.</h5>
                    <p>We read between the lines. We ask questions banks never bother with. Because we don’t just
                        approve numbers — we approve momentum.</p>
                    <button class="btn-1 px-4 py-3 rounded-5 ">Be Told Yes
                        <span><img src="/assets/images/svg/arrow-left-down-line.svg" alt=""></span>
                    </button>
                </div>
                <div class="col-6">
                    <img src="/assets/images/14327660_5474228 1.png" alt="">
                </div>
            </div>
        </section>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
