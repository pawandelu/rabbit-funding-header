<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .custom-nav-container {
            max-width: 1172px;
            width: 100%;
            margin: auto;
            padding: 0 16px;
        }

        @media (max-width : 768px) {
            .menu {
                position: fixed;
                background-color: whitesmoke;
                width: 100%;
                height: 100%;
                top: 0;
                left: 100%;
                justify-content: center;
                align-items: center;
                display: flex;
                transition: all 0.3s;
            }

            #menu-button:checked~.menu {
                left: 0;
            }
        }
    </style>
<body>
    <header>
        <div class="custom-nav-container">
            <div class="d-flex py-5 align-items-center justify-content-between">
                <a href="/">
                    <img src="./assets/images/svg/logo.svg" alt="logo">
                </a>
                <input hidden type="checkbox" id="menu-button">
                <label class="d-md-none position-relative z-1" for="menu-button">Menu</label>
                <nav class="menu">
                    <div class="d-flex gap-4 align-items-center flex-column flex-md-row">
                        <a class="text-decoration-none" href="/">Home</a>
                        <a class="text-decoration-none" href="/">About</a>
                        <a class="text-decoration-none" href="/">Blog</a>
                        <button class="px-4 py-2 rounded-3 bg-dark d-md-none d-flex text-white m-0">
                            contact
                        </button>
                    </div>
                </nav>

                <button class="px-4 py-2 rounded-3 bg-dark d-md-flex d-none  text-white m-0">
                    contact
                </button>
            </div>
        </div>
    </header>
